name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # 升級到 v4 以解決 Node.js 警告
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 檢查 Token 是否有成功載入
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN is missing! Please check your Repository Secrets."
            exit 1
          fi
          
          # 執行推送 (請確保下方的使用者名稱和空間名正確)
          git push --force https://bvbnjghui:$HF_TOKEN@huggingface.co/spaces/bvbnjghui/voice-to-text main
        
